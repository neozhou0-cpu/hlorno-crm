    <script>
      // 处理404重定向路由恢复
      (function() {
        var redirectPath = sessionStorage.getItem('redirect_path');
        if (redirectPath) {
          sessionStorage.removeItem('redirect_path');
          // 使用history API恢复路由
          if (window.history && window.history.replaceState) {
            window.history.replaceState(null, null, redirectPath);
          }
        }
      })();
    </script>

    <div id="root"></div>
